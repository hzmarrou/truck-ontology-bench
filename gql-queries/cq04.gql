// CQ4: For each trip, list the driver, truck, and route together.
// Tests: 3 edges out of Trip (trip_driver, trip_truck, trip_route) in a single query.
MATCH (tr:`Trip`)-[:`trip_driver`]->(d:`Driver`)
MATCH (tr)-[:`trip_truck`]->(tk:`Truck`)
MATCH (tr)-[:`trip_route`]->(r:`Route`)
RETURN tr.trip_number AS trip_number,
       d.employee_id AS driver,
       tk.truck_number AS truck,
       r.route_name AS route
LIMIT 25;
