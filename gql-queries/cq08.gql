// CQ8: Hazmat loads and the drivers currently eligible to haul them
// (mirrors scenario Q07).
// Tests: the query can express the semantic intersection of
// load.required_endorsements and driver.cdl_endorsements. On the
// current seed both properties are modelled as a JSON array surfaced
// as a string; the LIKE check is intentional — a Naked agent that
// treats it as a scalar will get the wrong answer.
MATCH (l:`Load`)
MATCH (d:`Driver`)
WHERE l.required_endorsements LIKE '%H%'
  AND d.cdl_endorsements LIKE '%H%'
RETURN l.load_number AS load_number,
       d.employee_id AS driver_id,
       d.first_name AS first_name,
       d.last_name AS last_name
LIMIT 25;
