// CQ11: Trucks that have NEVER had a maintenance event
// (mirrors scenario Q12).
// Tests: the GQL equivalent of a LEFT JOIN / anti-join — the pattern
// must exclude trucks that appear on any maintenance_event_truck edge.
MATCH (t:`Truck`)
WHERE NOT EXISTS {
  MATCH (:`MaintenanceEvent`)-[:`maintenance_event_truck`]->(t)
}
RETURN t.truck_number AS truck_number,
       t.make AS make,
       t.model AS model
LIMIT 25;
